apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-committee
  namespace: statex-apps
  labels:
    app: school-committee
    managed-by: k8s-migration
  annotations:
    # HTTP-01 solver: works for any registrar
    cert-manager.io/cluster-issuer: "letsencrypt-http01"
    # Redirect HTTP → HTTPS
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    traefik.ingress.kubernetes.io/router.middlewares: "statex-apps-redirect-https@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - strilkove.cz
        - www.strilkove.cz
      secretName: school-committee-tls
  rules:
    - host: strilkove.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: school-committee
                port:
                  number: 4800
    - host: www.strilkove.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: school-committee
                port:
                  number: 4800

apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-committee
  namespace: statex-apps
  labels:
    app: school-committee
    managed-by: k8s-migration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: school-committee
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: school-committee
    spec:
      containers:
        - name: app
          image: localhost:5000/school-committee:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4800
              name: http
          envFrom:
            - configMapRef:
                name: school-committee-config
            - secretRef:
                name: school-committee-secret
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 4800
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4800
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

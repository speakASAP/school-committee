apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: school-committee-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: school-committee-secret
    creationPolicy: Owner
  data:
    # Auth service
    - secretKey: AUTH_SERVICE_CLIENT_SECRET
      remoteRef:
        key: secret/prod/school-committee/auth
        property: AUTH_SERVICE_CLIENT_SECRET
    - secretKey: AUTH_INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/school-committee/auth
        property: AUTH_INTERNAL_SERVICE_TOKEN
    # DB service
    - secretKey: DB_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/school-committee/db
        property: DB_SERVICE_TOKEN
    # Payments
    - secretKey: PAYMENT_WEBHOOK_SECRET
      remoteRef:
        key: secret/prod/school-committee/payments
        property: PAYMENT_WEBHOOK_SECRET
    - secretKey: PAYMENT_ACCOUNT_IBAN
      remoteRef:
        key: secret/prod/school-committee/payments
        property: PAYMENT_ACCOUNT_IBAN
    - secretKey: PAYMENT_ACCOUNT_NUMBER
      remoteRef:
        key: secret/prod/school-committee/payments
        property: PAYMENT_ACCOUNT_NUMBER
    - secretKey: PAYMENT_BANK_CODE
      remoteRef:
        key: secret/prod/school-committee/payments
        property: PAYMENT_BANK_CODE
    # Notifications
    - secretKey: SMTP_HOST
      remoteRef:
        key: secret/prod/school-committee/notifications
        property: SMTP_HOST
    - secretKey: SMTP_USER
      remoteRef:
        key: secret/prod/school-committee/notifications
        property: SMTP_USER
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: secret/prod/school-committee/notifications
        property: SMTP_PASSWORD
    - secretKey: EMAIL_FROM
      remoteRef:
        key: secret/prod/school-committee/notifications
        property: EMAIL_FROM
    # Storage
    - secretKey: STORAGE_ACCESS_KEY
      remoteRef:
        key: secret/prod/school-committee/storage
        property: STORAGE_ACCESS_KEY
    - secretKey: STORAGE_SECRET_KEY
      remoteRef:
        key: secret/prod/school-committee/storage
        property: STORAGE_SECRET_KEY
    - secretKey: STORAGE_BUCKET
      remoteRef:
        key: secret/prod/school-committee/storage
        property: STORAGE_BUCKET
